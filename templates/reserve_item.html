{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow-sm border-success">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">Бронювання подарунка</h4>
            </div>
            <div class="card-body">
                <p>Ви збираєтесь подарувати: <b>{{ item.name }}</b></p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Як вас звати?</label>
                        <input type="text" name="reserver_name" class="form-control" placeholder="Наприклад: Сашко" required>
                        <div class="form-text">Інші побачать, що цей подарунок вже готуєте ви.</div>
                    </div>
                    
                    <button type="submit" class="btn btn-success w-100">Підтвердити бронювання</button>
                    <a href="{% url 'wishlist_detail' item.wishlist.pk %}" class="btn btn-link w-100 text-center mt-2 text-muted">Скасувати</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
